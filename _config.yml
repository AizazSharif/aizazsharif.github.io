# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------
name: Aizaz Sharif
title: Aizaz Sharif
email: aizazsharif@gmail.com
description: > # this means to ignore newlines until "url:"
  Computer Science Major, Researcher, Software Engineer, and a Philomath
url:  aizazsharif.github.io # the base hostname & protocol for your site
baseurl: aizazsharif.github.io # the subpath of your site, e.g. /blog/
last_updated: # leave blank if you don't want to display last updated

# -----------------------------------------------------------------------------
# Social integration
# -----------------------------------------------------------------------------
github_username: AizazSharif
twitter_username: AizazSharif420
linkedin_username: aizazsharif
scholar_userid: # your Google Scholar ID
orcid_id: # your ORCID ID
medium_username: AizazSharif420
quora_username: # your Quora username

contact_note: >
    The best way to contact me is through my email aizazsharif@gmail.com.

google_analytics: UA-121645203-1

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------
blog_name: Aizaz Sharif
blog_description:  Computer Science Major, Researcher, Software Engineer, and a Philomath

# Pagination
paginate: 5
permalink: /blog/:year/:title/
paginate_path: /blog/page:num/

text:
  pagination:
    newer: 'Newer'
    older: 'Older'

# Comments
disqus_shortname: Aizaz Sharif # put your disqus shortname

# Optional features
show_social_icons:  true
enable_anchorjs:    false
enable_katex:       true

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------
collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/

news_limit: 5

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

# Build settings
markdown: kramdown
highlighter: pygments

# Includes & excludes
include: ['_pages']
exclude: [vendor]

# Plug-ins
plugins:
    - jekyll-email-protect
    - jekyll-paginate
    - jekyll-scholar
    - jemoji
    - jekyll-watch
    - jemoji

# Jekyll-Scholar
scholar:

  last_name: Sharif

  style: apa
  locale: en

  sort_by: year
  order: descending

  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib

  replace_strings: true
  join_strings: true

  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details

  query: "@*"

# -----------------------------------------------------------------------------
# Other settings
# -----------------------------------------------------------------------------
jquery_version: "1.12.4"
katex_version: "0.9.0"
anchorjs_version: "3.2.2"
