# Site settings
title: Aizaz Sharif
projects: true # false to hide my work
description:  >-
  Turpis egestas integer eget aliquet nibh praesent tristique magna sit amet 
  purus gravida quis blandit turpis cursus in hac habitasse platea <a href="#">dictumst</a> quisque sagittis.
lang: en-US
timezone: Asia/Jakarta
icon: favicon.ico

# User settings
author: Aizaz Sharif
  name: Aizaz Sharif
  username: aizaz
  email: aizazsharif@gmail.com
  avatar: '/assets/img/avatar.png'

# Url settings
url: https://aizazsharif.github.io/
baseurl: ""
permalink: /:categories/:title
google_analytics: UA-121645203-1
fb_appid: 1806380839422028

collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
syntax_highlighter: rouge

# Default front matter
defaults:
  -
    scope:
      path: ""
    values:
      layout: post
      image: /assets/img/avatar.png

# Build settings
sass:
  style: compressed
include:
  - _redirects
  - .htaccess
exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CHANGELOG.md
  - README.md
  - node_modules 
  - bangsring.gemspec
  - CODE_OF_CONDUCT.md
  
# Plugins
plugins:
  - jekyll-feed
  - jekyll-sass-converter
  - jekyll-sitemap
